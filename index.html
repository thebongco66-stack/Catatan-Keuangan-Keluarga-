<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Keuangan Keluarga</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#0f172a;
  color:white;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:16px;
  margin-bottom:16px;
}

h1{
  margin-bottom:20px;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:8px;
  margin-bottom:16px;
  border:none;
  border-radius:10px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#10b981;
  color:white;
  font-size:16px;
  font-weight:bold;
}

.tx{
  background:#334155;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
}

.small{
  color:#94a3b8;
  font-size:13px;
}
</style>
</head>
<body>

<h1>🏡 Keuangan Keluarga</h1>

<div class="card">

<h3>Tambah Transaksi</h3>

<input type="text" id="desc" placeholder="Keterangan">

<input type="number" id="amount" placeholder="Nominal">

<select id="type">
  <option value="keluar">Pengeluaran</option>
  <option value="masuk">Pemasukan</option>
</select>

<select id="user">
  <option value="suami">Suami</option>
  <option value="istri">Istri</option>
</select>

<button onclick="addTransaction()">
Tambah
</button>

</div>

<div class="card">

<h3>Realtime Transaksi</h3>

<div id="list"></div>

</div>

<script>

const SUPABASE_URL =
'https://ndpmjznbhcnoiwmzvnhq.supabase.co'

const SUPABASE_KEY =
'sb_publishable_fvYPl6s4oSCh1eO7jckxUg_JuXuwaZG'

const supabase =
window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
)

async function loadTransactions(){

  const { data,error } = await supabase
    .from('transactions')
    .select('*')
    .order('id',{ascending:false})

  if(error){
    console.log(error)
    return
  }

  renderTransactions(data)
}

function renderTransactions(data){

  const list =
  document.getElementById('list')

  list.innerHTML=''

  data.forEach(item=>{

    list.innerHTML += `
      <div class="tx">

        <b>${item.description}</b>

        <div>
          Rp ${Number(item.amount)
            .toLocaleString('id-ID')}
        </div>

        <div class="small">
          ${item.type} • ${item.created_by}
        </div>

      </div>
    `

  })

}

async function addTransaction(){

  const desc =
  document.getElementById('desc').value

  const amount =
  document.getElementById('amount').value

  const type =
  document.getElementById('type').value

  const user =
  document.getElementById('user').value

  if(!desc || !amount){
    alert('Lengkapi data')
    return
  }

  const { error } = await supabase
    .from('transactions')
    .insert([
      {
        family_code:'keluarga01',
        type:type,
        description:desc,
        amount:amount,
        category:'umum',
        transaction_date:new Date(),
        created_by:user
      }
    ])

  if(error){
    console.log(error)
    alert('Gagal tambah data')
    return
  }

  document.getElementById('desc').value=''
  document.getElementById('amount').value=''

}

supabase
.channel('transactions-channel')
.on(
  'postgres_changes',
  {
    event:'*',
    schema:'public',
    table:'transactions'
  },
  payload=>{
    loadTransactions()
  }
)
.subscribe()

loadTransactions()

</script>

</body>
</html>
