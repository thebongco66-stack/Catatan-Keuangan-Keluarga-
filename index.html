<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Keuangan Keluarga</title>

<style>

body{
  background:#081229;
  color:white;
  font-family:Arial;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}

input,select,button{
  width:100%;
  padding:14px;
  margin-bottom:14px;
  border:none;
  border-radius:12px;
  font-size:16px;
}

button{
  background:#10b981;
  color:white;
  font-weight:bold;
}

.tx{
  background:#334155;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
}

</style>
</head>
<body>

<h1>🏡 Keuangan Keluarga</h1>

<div class="card">

<h2>Tambah Transaksi</h2>

<input
id="desc"
placeholder="Keterangan">

<input
id="amount"
type="number"
placeholder="Nominal">

<select id="type">
  <option value="masuk">Pemasukan</option>
  <option value="keluar">Pengeluaran</option>
</select>

<select id="user">
  <option value="suami">Suami</option>
  <option value="istri">Istri</option>
</select>

<button id="btnTambah">
Tambah
</button>

</div>

<div class="card">

<h2>Realtime Data</h2>

<div id="list">
Loading...
</div>

</div>

<script type="module">

import {
  createClient
} from 'https://esm.sh/@supabase/supabase-js@2'

const supabase =
createClient(
  'https://ndpmjznbhcnoiwmzvnhq.supabase.co',
  'sb_publishable_fvYPl6s4oSCh1eO7jckxUg_JuXuwaZG'
)

const list =
document.getElementById('list')

async function loadData(){

  const { data, error } =
  await supabase
    .from('transactions')
    .select('*')
    .order('id',{
      ascending:false
    })

  console.log(data)
  console.log(error)

  if(error){

    alert(error.message)

    return
  }

  list.innerHTML=''

  if(data.length===0){

    list.innerHTML='Belum ada data'

    return
  }

  data.forEach(item=>{

    list.innerHTML += `

      <div class="tx">

        <b>${item.description}</b>

        <div>
          Rp ${Number(item.amount)
            .toLocaleString('id-ID')}
        </div>

        <small>
          ${item.type}
          -
          ${item.created_by}
        </small>

      </div>

    `

  })

}

document
.getElementById('btnTambah')
.addEventListener(
  'click',
  async ()=>{

    const desc =
    document
    .getElementById('desc')
    .value

    const amount =
    document
    .getElementById('amount')
    .value

    const type =
    document
    .getElementById('type')
    .value

    const user =
    document
    .getElementById('user')
    .value

    if(!desc || !amount){

      alert('Lengkapi data')

      return
    }

    const { error } =
    await supabase
      .from('transactions')
      .insert([
        {
          family_code:'keluarga01',
          description:desc,
          amount:Number(amount),
          type:type,
          category:'umum',
          transaction_date:
          new Date()
          .toISOString()
          .split('T')[0],
          created_by:user
        }
      ])

    if(error){

      console.log(error)

      alert(error.message)

      return
    }

    alert('Berhasil tambah transaksi')

    document
    .getElementById('desc')
    .value=''

    document
    .getElementById('amount')
    .value=''

    loadData()

  }
)

supabase
.channel('realtime-transactions')
.on(
  'postgres_changes',
  {
    event:'*',
    schema:'public',
    table:'transactions'
  },
  payload=>{

    loadData()

  }
)
.subscribe()

loadData()

</script>

</body>
</html>
