<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Keuangan Keluarga</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#081229;
  color:white;
  font-family:Arial,sans-serif;
  padding:20px;
}

.container{
  max-width:700px;
  margin:auto;
}

h1{
  font-size:42px;
  margin-bottom:20px;
}

.card{
  background:#1c2942;
  border-radius:24px;
  padding:20px;
  margin-bottom:20px;
}

h2{
  margin-bottom:20px;
  font-size:28px;
}

input,
select{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  margin-bottom:16px;
  font-size:16px;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  background:#1ec98f;
  color:white;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}

button:active{
  transform:scale(0.98);
}

.summary{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.sum-card{
  padding:16px;
  border-radius:18px;
}

.green{
  background:#14532d;
}

.red{
  background:#7f1d1d;
}

.blue{
  background:#1e3a8a;
}

.orange{
  background:#9a3412;
}

.label{
  font-size:14px;
  opacity:0.8;
  margin-bottom:10px;
}

.value{
  font-size:24px;
  font-weight:bold;
}

.category-card{
  background:#2b3448;
  border-radius:22px;
  overflow:hidden;
  margin-bottom:18px;
}

.category-header{
  padding:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
  font-size:20px;
}

.category-body{
  padding:10px 18px 18px;
}

.tx{
  padding:14px 0;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.tx:last-child{
  border-bottom:none;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.small{
  font-size:13px;
  color:#cbd5e1;
  margin-top:5px;
}

.masuk{
  color:#22c55e;
  font-weight:bold;
}

.keluar{
  color:#ef4444;
  font-weight:bold;
}

.delete-btn{
  margin-top:10px;
  background:#ef4444;
  padding:10px;
  border-radius:10px;
  font-size:14px;
}

.loading{
  text-align:center;
  color:#94a3b8;
  padding:20px;
}

.success{
  background:#14532d;
  color:#bbf7d0;
  padding:14px;
  border-radius:14px;
  margin-bottom:16px;
  display:none;
}

.error{
  background:#7f1d1d;
  color:#fecaca;
  padding:14px;
  border-radius:14px;
  margin-bottom:16px;
  display:none;
}

.rumah{
  background:#dff7f2;
  color:#065f46;
}

.komutasi{
  background:#dbeafe;
  color:#1e3a8a;
}

.istri{
  background:#fce7f3;
  color:#9d174d;
}

.kesehatan{
  background:#fef3c7;
  color:#92400e;
}

.tabungan{
  background:#dcfce7;
  color:#166534;
}

.sosial{
  background:#f3f4f6;
  color:#374151;
}

.badge{
  background:white;
  padding:6px 12px;
  border-radius:999px;
  font-size:13px;
}

</style>
</head>
<body>

<div class="container">

<h1>🏡 Keuangan Keluarga</h1>

<div class="success" id="successBox"></div>
<div class="error" id="errorBox"></div>

<!-- FORM -->

<div class="card">

<h2>Tambah Transaksi</h2>

<select id="mainCategory">

  <option value="Rumah Tangga">
    🏠 Rumah Tangga
  </option>

  <option value="Komutasi Suami">
    🚆 Komutasi Suami
  </option>

  <option value="Kebutuhan Istri">
    👩 Kebutuhan Istri
  </option>

  <option value="Kesehatan">
    ❤️ Kesehatan & Pendidikan
  </option>

  <option value="Tabungan">
    🐷 Tabungan & Dana
  </option>

  <option value="Sosial">
    🎁 Sosial & Tak Terduga
  </option>

</select>

<select id="subCategory"></select>

<input
id="amount"
type="number"
placeholder="Nominal">

<select id="type">

  <option value="keluar">
    Pengeluaran
  </option>

  <option value="masuk">
    Pemasukan
  </option>

</select>

<select id="user">

  <option value="suami">
    Suami
  </option>

  <option value="istri">
    Istri
  </option>

</select>

<button id="btnTambah">
Tambah Transaksi
</button>

</div>

<!-- DASHBOARD -->

<div class="card">

<h2>Dashboard</h2>

<div class="summary">

  <div class="sum-card green">
    <div class="label">Pemasukan</div>
    <div class="value" id="totalMasuk">
      Rp 0
    </div>
  </div>

  <div class="sum-card red">
    <div class="label">Pengeluaran</div>
    <div class="value" id="totalKeluar">
      Rp 0
    </div>
  </div>

  <div class="sum-card blue">
    <div class="label">Sisa Uang</div>
    <div class="value" id="sisaUang">
      Rp 0
    </div>
  </div>

  <div class="sum-card orange">
    <div class="label">Jumlah Data</div>
    <div class="value" id="jumlahData">
      0
    </div>
  </div>

</div>

</div>

<!-- DATA -->

<div id="categoryContainer">

<div class="loading">
Memuat data...
</div>

</div>

</div>

<script type="module">

import {
  createClient
} from 'https://esm.sh/@supabase/supabase-js@2'

const supabase =
createClient(
  'https://ndpmjznbhcnoiwmzvnhq.supabase.co',
  'sb_publishable_fvYPl6s4oSCh1eO7jckxUg_JuXuwaZG'
)

const container =
document.getElementById(
  'categoryContainer'
)

const subCategories = {

  "Rumah Tangga":[
    "Belanja Bulanan",
    "Belanja Harian",
    "Listrik",
    "Air",
    "Gas LPG"
  ],

  "Komutasi Suami":[
    "Kos Surabaya",
    "Tiket Kereta",
    "Transport",
    "BBM Motor",
    "Makan Harian"
  ],

  "Kebutuhan Istri":[
    "Skincare",
    "Pulsa",
    "BBM Motor"
  ],

  "Kesehatan":[
    "BPJS",
    "Obat",
    "Sekolah Anak"
  ],

  "Tabungan":[
    "Dana Darurat",
    "Tabungan Motor",
    "Hari Raya"
  ],

  "Sosial":[
    "Kondangan",
    "Sumbangan",
    "Tak Terduga"
  ]

}

const categoryStyles = {

  "Rumah Tangga":{
    class:"rumah",
    icon:"🏠",
    label:"Rutin bulanan"
  },

  "Komutasi Suami":{
    class:"komutasi",
    icon:"🚆",
    label:"Surabaya ↔ Tuban"
  },

  "Kebutuhan Istri":{
    class:"istri",
    icon:"👩",
    label:"Kebutuhan pribadi"
  },

  "Kesehatan":{
    class:"kesehatan",
    icon:"❤️",
    label:"Prioritas keluarga"
  },

  "Tabungan":{
    class:"tabungan",
    icon:"🐷",
    label:"Jangka menengah"
  },

  "Sosial":{
    class:"sosial",
    icon:"🎁",
    label:"Kondisional"
  }

}

const mainCategory =
document.getElementById(
  'mainCategory'
)

const subCategory =
document.getElementById(
  'subCategory'
)

function updateSubCategory(){

  const selected =
  mainCategory.value

  subCategory.innerHTML=''

  subCategories[selected]
  .forEach(item=>{

    subCategory.innerHTML += `

      <option value="${item}">
        ${item}
      </option>

    `

  })

}

mainCategory
.addEventListener(
  'change',
  updateSubCategory
)

updateSubCategory()

function showSuccess(text){

  const box =
  document.getElementById(
    'successBox'
  )

  box.style.display='block'

  box.innerHTML=text

  setTimeout(()=>{
    box.style.display='none'
  },3000)

}

function showError(text){

  const box =
  document.getElementById(
    'errorBox'
  )

  box.style.display='block'

  box.innerHTML=text

  setTimeout(()=>{
    box.style.display='none'
  },5000)

}

async function loadData(){

  const { data, error } =
  await supabase
    .from('transactions')
    .select('*')
    .order('id',{
      ascending:false
    })

  if(error){

    showError(error.message)

    return
  }

  renderData(data)

}

function renderData(data){

  let totalMasuk = 0
  let totalKeluar = 0

  document.getElementById(
    'jumlahData'
  ).innerHTML =
  data.length

  const grouped = {}

  data.forEach(item=>{

    const main =
    item.description.split(' - ')[0]

    if(!grouped[main]){
      grouped[main]=[]
    }

    grouped[main].push(item)

    if(item.type==='masuk'){
      totalMasuk += Number(item.amount)
    }else{
      totalKeluar += Number(item.amount)
    }

  })

  document.getElementById(
    'totalMasuk'
  ).innerHTML =
  'Rp ' +
  totalMasuk.toLocaleString('id-ID')

  document.getElementById(
    'totalKeluar'
  ).innerHTML =
  'Rp ' +
  totalKeluar.toLocaleString('id-ID')

  document.getElementById(
    'sisaUang'
  ).innerHTML =
  'Rp ' +
  (totalMasuk-totalKeluar)
  .toLocaleString('id-ID')

  container.innerHTML=''

  Object.keys(grouped)
  .forEach(category=>{

    const style =
    categoryStyles[category]

    let itemsHTML=''

    grouped[category]
    .forEach(item=>{

      const sub =
      item.description
      .split(' - ')[1]

      itemsHTML += `

        <div class="tx">

          <div class="row">

            <div>

              <b>${sub}</b>

              <div class="small">
                ${item.created_by}
              </div>

            </div>

            <div class="${
              item.type==='masuk'
              ? 'masuk'
              : 'keluar'
            }">

              ${
                item.type==='masuk'
                ? '+'
                : '-'
              }

              Rp ${Number(item.amount)
              .toLocaleString('id-ID')}

            </div>

          </div>

          <button
          class="delete-btn"
          onclick="deleteTransaction(${item.id})">

            Hapus

          </button>

        </div>

      `

    })

    container.innerHTML += `

      <div class="category-card">

        <div class="
        category-header
        ${style.class}
        ">

          <div>

            ${style.icon}
            ${category}

          </div>

          <div class="badge">
            ${style.label}
          </div>

        </div>

        <div class="category-body">

          ${itemsHTML}

        </div>

      </div>

    `

  })

}

document
.getElementById('btnTambah')
.addEventListener(
  'click',
  async ()=>{

    const amount =
    document
    .getElementById('amount')
    .value

    const type =
    document
    .getElementById('type')
    .value

    const user =
    document
    .getElementById('user')
    .value

    if(!amount){

      showError(
        'Nominal wajib diisi'
      )

      return
    }

    const description =
    mainCategory.value +
    ' - ' +
    subCategory.value

    const { error } =
    await supabase
      .from('transactions')
      .insert([
        {
          family_code:'keluarga01',

          description:
          description,

          amount:Number(amount),

          type:type,

          category:
          mainCategory.value,

          transaction_date:
          new Date()
          .toISOString()
          .split('T')[0],

          created_by:user
        }
      ])

    if(error){

      showError(error.message)

      return
    }

    showSuccess(
      'Transaksi berhasil ditambahkan'
    )

    document
    .getElementById('amount')
    .value=''

    loadData()

  }
)

window.deleteTransaction =
async function(id){

  const confirmDelete =
  confirm(
    'Hapus transaksi ini?'
  )

  if(!confirmDelete){
    return
  }

  const { error } =
  await supabase
    .from('transactions')
    .delete()
    .eq('id',id)

  if(error){

    showError(error.message)

    return
  }

  showSuccess(
    'Transaksi berhasil dihapus'
  )

  loadData()

}

supabase
.channel('realtime-transactions')
.on(
  'postgres_changes',
  {
    event:'*',
    schema:'public',
    table:'transactions'
  },
  payload=>{

    loadData()

  }
)
.subscribe()

loadData()

</script>

</body>
</html>
